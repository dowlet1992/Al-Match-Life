<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI Matches - AI Match Life</title>

<style>
*{box-sizing:border-box}

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:32px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.back{
    display:inline-block;
    color:white;
    text-decoration:none;
    background:#334155;
    padding:12px 16px;
    border-radius:14px;
    margin-bottom:18px;
    font-weight:bold;
}

.header{
    background:#1e293b;
    padding:30px;
    border-radius:28px;
    margin-bottom:24px;
}

.header h1{
    margin:0 0 8px 0;
    font-size:36px;
}

.header p{
    margin:0;
    color:#cbd5e1;
}

.match-card{
    background:#1e293b;
    padding:24px;
    border-radius:26px;
    margin-bottom:22px;
}

.match-top{
    display:flex;
    align-items:center;
    gap:18px;
}

.avatar{
    width:82px;
    height:82px;
    border-radius:50%;
    object-fit:cover;
    background:#334155;
    border:3px solid #334155;
}

.match-info{
    flex:1;
}

.match-info h2{
    margin:0 0 6px 0;
    font-size:26px;
}

.match-info p{
    margin:0 0 5px 0;
    color:#cbd5e1;
}

.country{
    color:#94a3b8!important;
}

.score-box{
    background:#0f172a;
    padding:16px;
    border-radius:20px;
    min-width:120px;
    text-align:center;
}

.score{
    color:#22c55e;
    font-size:30px;
    font-weight:bold;
}

.level{
    color:#cbd5e1;
    font-size:14px;
    margin-top:4px;
}

.details{
    background:#0f172a;
    padding:18px;
    border-radius:20px;
    margin-top:20px;
}

.details p{
    margin:8px 0;
    color:#e5e7eb;
}

.reasons{
    margin-top:20px;
}

.reasons h3{
    margin-bottom:10px;
}

.reasons ul{
    margin:0;
    padding-left:22px;
    color:#cbd5e1;
    line-height:1.6;
}

.actions{
    display:flex;
    gap:12px;
    margin-top:22px;
    flex-wrap:wrap;
}

.actions a{
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:13px 18px;
    border-radius:14px;
    font-weight:bold;
}

.actions .message{
    background:#16a34a;
}

.empty-card{
    background:#1e293b;
    padding:28px;
    border-radius:24px;
    text-align:center;
    color:#cbd5e1;
}

@media(max-width:760px){
    body{padding:18px}

    .match-top{
        align-items:flex-start;
    }

    .score-box{
        min-width:90px;
    }

    .header h1{
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="container">

    <a class="back" href="/dashboard/{{ email }}">← Назад</a>

    <section class="header">
        <h1>🤝 AI Matches</h1>
        <p>AI анализирует цели, интересы, навыки и профиль, чтобы предложить наиболее подходящих людей.</p>
    </section>

    {{ matches|safe }}

</div>

</body>
</html>
