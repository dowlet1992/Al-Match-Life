<!DOCTYPE html>
<html lang="{{ ui.language_code }}" dir="{{ ui.text_direction }}">
<head>
<meta charset="UTF-8">
<title>{{ ui.search_people }} - AI Match Life</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:white;padding:40px}
.container{max-width:1000px;margin:auto}
.card{background:#1e293b;padding:25px;border-radius:20px;margin-bottom:20px}
input{width:100%;padding:14px;border:none;border-radius:10px;margin-bottom:12px;box-sizing:border-box}
button{padding:12px 20px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer}
.back{background:#334155}
.score{color:#22c55e;font-weight:bold}
</style>
</head>
<body>

<div class="container">
    <h1>🔍 {{ ui.search_people }}</h1>

    <div class="card">
        <form method="POST">
            {{ csrf_token_input | safe }}
            <input type="text" name="keyword" placeholder="{{ ui.search_people_placeholder }}" required>
            <button type="submit">{{ ui.search }}</button>
        </form>
    </div>

    {{ results | safe }}

    <button class="back" onclick="window.location.href='/dashboard/{{ email }}'">{{ ui.back_to_dashboard }}</button>
</div>

</body>
</html>
