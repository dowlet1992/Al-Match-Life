<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Match Life</title>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:radial-gradient(circle at top,#172554 0,#0f172a 42%,#020617 100%);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
}
.card{
    width:100%;
    max-width:420px;
    background:rgba(15,23,42,.88);
    border:1px solid rgba(148,163,184,.18);
    padding:32px;
    border-radius:26px;
    box-shadow:0 30px 85px rgba(0,0,0,.42);
}
.logo{
    width:62px;
    height:62px;
    margin:0 auto 14px;
    border-radius:20px;
    display:grid;
    place-items:center;
    font-size:25px;
    font-weight:900;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}
h1,p{text-align:center}
h1{margin:0;font-size:30px}
p{color:#94a3b8;margin:10px 0 24px}
input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #334155;
    border-radius:13px;
    background:#0b1220;
    color:white;
    font-size:15px;
}
.password-wrap{
    position:relative;
    width:100%;
}
.password-wrap input{
    padding-right:50px;
}
.password-eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    width:36px;
    height:36px;
    border:none;
    border-radius:11px;
    background:rgba(51,65,85,.92);
    color:white;
    cursor:pointer;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    margin:6px 0 0 0;
}
.password-eye:hover{
    background:#475569;
}
button{
    width:100%;
    padding:15px;
    margin-top:12px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
    font-weight:800;
    color:white;
}
.login-btn{background:linear-gradient(135deg,#2563eb,#7c3aed)}
.register-btn{background:#10b981}
.forgot{
    display:block;
    text-align:right;
    margin:10px 2px 14px;
    color:#93c5fd;
    text-decoration:none;
    font-size:14px;
    font-weight:650;
}
.forgot:hover{text-decoration:underline}
</style>
</head>

<body>
<div class="card">
    <div class="logo">AI</div>
    <h1>AI Match Life</h1>
    <p>Найди правильных людей для жизни, бизнеса и роста</p>

    <form method="POST" action="/login">
        {{ csrf_token_input|safe }}
        <input type="text" name="login" placeholder="Email или телефон, например +49176..." required>

        <div class="password-wrap">
            <input id="login-password" type="password" name="password" placeholder="Пароль" required>
            <button class="password-eye" type="button" onclick="toggleLoginPassword()" aria-label="Показать пароль">👁</button>
        </div>

        <a class="forgot" href="/forgot_password">Забыли пароль?</a>

        <button class="login-btn" type="submit">Войти</button>
    </form>

    <button class="register-btn" onclick="window.location.href='/register'">
        Создать аккаунт
    </button>
</div>

<script>
function toggleLoginPassword(){
    const input = document.getElementById('login-password');
    const button = document.querySelector('.password-eye');
    if(!input || !button) return;

    if(input.type === 'password'){
        input.type = 'text';
        button.textContent = '🙈';
        button.setAttribute('aria-label', 'Скрыть пароль');
    }else{
        input.type = 'password';
        button.textContent = '👁';
        button.setAttribute('aria-label', 'Показать пароль');
    }
}
</script>
</body>
</html>
